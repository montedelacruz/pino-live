name: Backup Repertoire

on:
  push:
    branches: [main]
    paths:
      - 'public/pino-import.json'

jobs:
  backup:
    if: "!contains(github.event.head_commit.message, '[repertoire-backup]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout (with history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 3
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rotate backups
        run: |
          if [ -f public/pino-import-backup-1.json ]; then
            cp public/pino-import-backup-1.json public/pino-import-backup-2.json
            echo "✓ Rotated backup-1 → backup-2"
          fi

          if git show HEAD~1:public/pino-import.json > public/pino-import-backup-1.json 2>/dev/null; then
            echo "✓ Saved previous pino-import.json as backup-1"
          else
            cp public/pino-import.json public/pino-import-backup-1.json
            echo "✓ First backup: copied current as backup-1"
          fi

      - name: Commit and push backups
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add public/pino-import-backup-1.json public/pino-import-backup-2.json
          if git diff --staged --quiet; then
            echo "No backup changes to commit."
          else
            git commit -m "chore: rotate repertoire backups [repertoire-backup]"
            git push
          fi
